name: Release

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

env:
  BUN_VERSION: 1.3.13

jobs:
  # Build binaries for each platform
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          - os: macos-14  # Apple Silicon (can run x64 via Rosetta)
            target: bun-darwin-arm64
            suffix: darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install dependencies (mimo-platform)
      working-directory: ./packages/mimo-platform
      run: bun install

    - name: Install dependencies (mimo-agent)
      working-directory: ./packages/mimo-agent
      run: bun install

    # Build mimo-platform with embedded assets
    - name: Build mimo-platform
      working-directory: ./packages/mimo-platform
      timeout-minutes: 15
      run: |
        echo "Building mimo-platform for ${{ matrix.target }}..."
        bun build --compile \
          --target=${{ matrix.target }} \
          ./src/index.tsx \
          ./src/assets.ts \
          --outfile ../../dist/mimo-platform-${{ matrix.suffix }} \
          2>&1
        echo "mimo-platform build complete"
        ls -lh ../../dist/mimo-platform-${{ matrix.suffix }} || echo "Binary not found"

    # Build mimo-agent
    - name: Build mimo-agent
      working-directory: ./packages/mimo-agent
      timeout-minutes: 10
      run: |
        echo "Building mimo-agent for ${{ matrix.target }}..."
        bun build --compile \
          --target=${{ matrix.target }} \
          ./src/index.ts \
          --outfile ../../dist/mimo-agent-${{ matrix.suffix }} \
          2>&1
        echo "mimo-agent build complete"
        ls -lh ../../dist/mimo-agent-${{ matrix.suffix }} || echo "Binary not found"

    # Make binaries executable
    - name: Make binaries executable
      run: |
        chmod +x dist/mimo-platform-${{ matrix.suffix }}
        chmod +x dist/mimo-agent-${{ matrix.suffix }}

    # Calculate checksums (cross-platform: sha256sum on Linux, shasum on macOS)
    - name: Calculate checksums
      run: |
        cd dist
        if command -v sha256sum &> /dev/null; then
          sha256sum mimo-platform-${{ matrix.suffix }} > mimo-platform-${{ matrix.suffix }}.sha256
          sha256sum mimo-agent-${{ matrix.suffix }} > mimo-agent-${{ matrix.suffix }}.sha256
        else
          shasum -a 256 mimo-platform-${{ matrix.suffix }} > mimo-platform-${{ matrix.suffix }}.sha256
          shasum -a 256 mimo-agent-${{ matrix.suffix }} > mimo-agent-${{ matrix.suffix }}.sha256
        fi

    # Upload artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.suffix }}
        path: |
          dist/mimo-platform-${{ matrix.suffix }}
          dist/mimo-platform-${{ matrix.suffix }}.sha256
          dist/mimo-agent-${{ matrix.suffix }}
          dist/mimo-agent-${{ matrix.suffix }}.sha256
        retention-days: 1

  # Create GitHub release
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: binaries-*
        merge-multiple: true

    - name: List downloaded artifacts
      run: ls -la dist/

    - name: Create checksums file
      run: |
        cd dist
        cat *.sha256 > checksums.txt

    - name: Get version and determine release type
      id: get_version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          # Tag push - use the tag version
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "IS_TAG=true" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=Release v$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VERSION" >> $GITHUB_OUTPUT
          echo "IS_LATEST=false" >> $GITHUB_OUTPUT
        elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
          # Main branch push - update latest release
          VERSION="latest-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "IS_TAG=false" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=Latest" >> $GITHUB_OUTPUT
          echo "TAG_NAME=latest" >> $GITHUB_OUTPUT
          echo "IS_LATEST=true" >> $GITHUB_OUTPUT
        else
          # Other branch - skip release
          echo "IS_TAG=false" >> $GITHUB_OUTPUT
          echo "SKIP_RELEASE=true" >> $GITHUB_OUTPUT
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Delete existing latest release (if updating)
      if: steps.get_version.outputs.IS_LATEST == 'true'
      run: |
        echo "Deleting existing latest release..."
        gh release delete latest --yes || echo "No existing latest release to delete"
        git push --delete origin latest || echo "No latest tag to delete"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create or update latest tag (for main branch)
      if: steps.get_version.outputs.IS_LATEST == 'true'
      run: |
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        git tag -fa latest -m "Latest release from main branch"
        git push -f origin latest
        echo "Updated latest tag"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.get_version.outputs.RELEASE_NAME }}
        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        draft: false
        prerelease: ${{ steps.get_version.outputs.IS_TAG == 'false' && steps.get_version.outputs.IS_LATEST != 'true' }}
        files: |
          dist/mimo-platform-*
          dist/mimo-agent-*
          dist/checksums.txt
        body: |
          ## Mimo ${{ steps.get_version.outputs.IS_LATEST == 'true' && 'Latest' || 'v' }}${{ steps.get_version.outputs.VERSION }}

          ${{ steps.get_version.outputs.IS_LATEST == 'true' && '**This is the latest development build from the main branch.**' || '' }}

          ### Downloads

          | Platform | mimo-platform | mimo-agent |
          |----------|---------------|------------|
          | Linux x64 | [mimo-platform-linux-x64](mimo-platform-linux-x64) | [mimo-agent-linux-x64](mimo-agent-linux-x64) |
          | macOS ARM64 (Apple Silicon) | [mimo-platform-darwin-arm64](mimo-platform-darwin-arm64) | [mimo-agent-darwin-arm64](mimo-agent-darwin-arm64) |

          ### Installation

          Download the appropriate binary for your platform and make it executable:

          ```bash
          # Linux
          chmod +x mimo-platform-linux-x64 mimo-agent-linux-x64

          # macOS
          chmod +x mimo-platform-darwin-arm64 mimo-agent-darwin-arm64
          ```

          ### Running the Platform Server

          Start the web platform (runs on port 3000 by default):

          ```bash
          # Linux
          ./mimo-platform-linux-x64

          # macOS
          ./mimo-platform-darwin-arm64
          ```

          **Configuration via environment variables:**

          ```bash
          export PORT=3000                    # Server port (default: 3000)
          export JWT_SECRET="your-secret"     # JWT signing key (required)
          export MIMO_HOME="$HOME/.mimo"      # Data directory (default: ~/.mimo)

          ./mimo-platform-linux-x64
          ```

          The platform listens on the PORT you specify (default 3000). Use a different port by setting `PORT=8080 ./mimo-platform-linux-x64`

          ### Running the Agent

          Start an agent that connects to the platform:

          ```bash
          # Linux
          ./mimo-agent-linux-x64 --token <AGENT_JWT> --platform ws://localhost:3000/ws/agent --provider opencode

          # macOS
          ./mimo-agent-darwin-arm64 --token <AGENT_JWT> --platform ws://localhost:3000/ws/agent --provider opencode
          ```

          **Getting an agent token:**
          1. Start the platform server
          2. Go to http://localhost:3000/agents
          3. Create a new agent and copy the JWT token

          **Available providers:** `opencode` or `claude`

          ### Verification

          Verify checksums:
          ```bash
          sha256sum -c checksums.txt
          ```

          ### Notes

          - Binaries are single-file executables with all assets embedded
          - No runtime dependencies required (includes Bun runtime)
          - Static assets are served from embedded memory when running compiled binary
          - First run creates `~/.mimo` directory for data storage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
